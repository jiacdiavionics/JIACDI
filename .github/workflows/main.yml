name: .NET Build

on:
  push:
    branches: [master, main, develop]
    tags:
      - '*'
  pull_request:
    branches: [master, main, develop]
  workflow_dispatch:

jobs:
  build-release:
    name: Build Release
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 10

      - name: Install Inno Setup
        run: |
          Invoke-WebRequest -Uri "https://jrsoftware.org/download.php/is.exe?site=1" -OutFile is_setup.exe
          Start-Process -Wait -FilePath .\is_setup.exe -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART"

      - name: Build
        shell: pwsh
        run: |
          $msbuildPath = Split-Path (& "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -requires Microsoft.Component.MSBuild -find MSBuild\Current\Bin\amd64\MSBuild.exe | Select-Object -First 1) -Parent
          $env:PATH = $msbuildPath + ';' + $env:PATH
          nuget locals all -clear
          msbuild -v:m -restore -t:Build -p:Configuration=Release MissionPlanner.sln

      - name: Build EXE Installer
        shell: pwsh
        run: |
          $version = "1.3.83"
          if (Test-Path "MissionPlanner.csproj") {
            $match = [regex]::Match((Get-Content "MissionPlanner.csproj" -Raw), '<Version>([^<]+)</Version>')
            if ($match.Success) { $version = $match.Groups[1].Value }
          }
          Write-Host "Building installer for version: $version"
          $issContent = Get-Content "MissionPlanner.iss" -Raw
          $issContent = $issContent -replace '#define MyAppVersion "[^"]*"', "#define MyAppVersion `"$version`""
          Set-Content "MissionPlanner.iss" $issContent
          New-Item -ItemType Directory -Force -Path "bin/installer" | Out-Null
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (Test-Path $iscc) {
            & $iscc "MissionPlanner.iss"
          } else {
            Write-Host "Inno Setup not found at: $iscc"
            exit 1
          }

      - uses: actions/upload-artifact@v4
        with:
          name: MissionPlanner-Release
          path: bin/Release/net461

      - uses: actions/upload-artifact@v4
        with:
          name: MissionPlanner-Installer
          path: bin/installer/*.exe

  build-debug:
    name: Build Debug
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 10

      - name: Cache multiple paths
        uses: actions/cache@v4
        with:
          path: |
            **/obj/**
          key: ${{ runner.os }}-buildDebug

      - name: Build
        shell: pwsh
        run: |
          $msbuildPath = Split-Path (& "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -requires Microsoft.Component.MSBuild -find MSBuild\Current\Bin\amd64\MSBuild.exe | Select-Object -First 1) -Parent
          $env:PATH = $msbuildPath + ';' + $env:PATH
          nuget locals all -clear
          msbuild -v:m -restore -t:Build -p:Configuration=Debug MissionPlanner.sln

      - uses: actions/upload-artifact@v4
        with:
          name: MissionPlanner-Debug
          path: bin/Debug/net461
