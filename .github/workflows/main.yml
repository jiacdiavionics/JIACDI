name: .NET Build

on:
  push:
    branches: [master, main, develop]
    tags:
      - '*'
  pull_request:
    branches: [master, main, develop]
  workflow_dispatch:

jobs:
  build-release:
    name: Build Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup VB SDK
        uses: microsoft/vssetup-samples@latest

      - name: Restore
        run: dotnet restore MissionPlanner.sln

      - name: Build Release
        run: msbuild MissionPlanner.sln -p:Configuration=Release -p:Platform=AnyCPU -verbosity:minimal -restore

      - name: Run Tests
        run: |
          msbuild MissionPlannerTests -p:Configuration=Release -p:Platform=AnyCPU -verbosity:minimal -restore
        continue-on-error: true

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MissionPlanner-Release
          path: ./bin/Release
          retention-days: 30

  build-debug:
    name: Build Debug
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup VB SDK
        uses: microsoft/vssetup-samples@latest

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore MissionPlanner.sln

      - name: Build Debug
        run: msbuild MissionPlanner.sln -p:Configuration=Debug -p:Platform=AnyCPU -verbosity:minimal -restore

      - name: Upload Debug Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MissionPlanner-Debug
          path: ./bin/Debug
          retention-days: 7
