name: .NET Build

on:
  push:
    branches: [master, main, develop]
    tags:
      - '*'
  pull_request:
    branches: [master, main, develop]
  workflow_dispatch:

jobs:
  build-release:
    name: Build Release
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Build Release
        run: powershell -Command "msbuild MissionPlanner.sln /p:Configuration=Release /p:Platform='Any CPU' /verbosity:minimal"
        shell: powershell

      - name: Package Release
        run: |
          Compress-Archive -Path "bin\Release\net472\*" -DestinationPath "MissionPlanner.zip" -Force
        shell: pwsh

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MissionPlanner-Release
          path: |
            ./bin/Release
            ./MissionPlanner.zip
          retention-days: 30

  build-debug:
    name: Build Debug
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Build Debug
        run: powershell -Command "msbuild MissionPlanner.sln /p:Configuration=Debug /p:Platform='Any CPU' /verbosity:minimal"
        shell: powershell

      - name: Upload Debug Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MissionPlanner-Debug
          path: ./bin/Debug
          retention-days: 7
