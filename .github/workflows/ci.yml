name: CI Pull Request

on:
  pull_request:
    branches: [master, main, develop]
  workflow_dispatch:

jobs:
  ci-check:
    name: CI Check
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 10

      - name: Build
        shell: pwsh
        run: |
          $msbuildPath = Split-Path (& "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -requires Microsoft.Component.MSBuild -find MSBuild\Current\Bin\amd64\MSBuild.exe | Select-Object -First 1) -Parent
          $env:PATH = $msbuildPath + ';' + $env:PATH
          nuget locals all -clear
          msbuild -v:m -restore -t:Build -p:Configuration=Debug MissionPlanner.sln
          msbuild -v:m -restore -t:Build -p:Configuration=Release MissionPlanner.sln
          Get-ChildItem -Recurse -Directory bin | Select-Object FullName

      - name: List Build Outputs
        shell: pwsh
        run: |
          Write-Host "=== Release Build ==="
          Get-ChildItem -Path "MissionPlanner/bin/Release" -Recurse -Include *.exe,*.dll | Select-Object FullName
          Write-Host "=== Debug Build ==="
          Get-ChildItem -Path "MissionPlanner/bin/Debug" -Recurse -Include *.exe,*.dll | Select-Object FullName

      - name: Upload Release Build Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: DIMP-Release-Build
          path: MissionPlanner/bin/Release/
          retention-days: 7

      - name: Upload Debug Build Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: DIMP-Debug-Build
          path: MissionPlanner/bin/Debug/
          retention-days: 7
