name: CI Pull Request

on:
  pull_request:
    branches: [master, main, develop]
  workflow_dispatch:

jobs:
  ci-check:
    name: CI Check
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 10

      - name: Diagnostic Info
        shell: pwsh
        run: |
          Write-Host "=== Environment ==="
          Write-Host "GITHUB_REF: $env:GITHUB_REF"
          Write-Host "GITHUB_HEAD_REF: $env:GITHUB_HEAD_REF"
          Write-Host "GITHUB_BASE_REF: $env:GITHUB_BASE_REF"
          Write-Host "GITHUB_EVENT_NAME: $env:GITHUB_EVENT_NAME"
          Write-Host ""
          Write-Host "=== Repository Files ==="
          Get-ChildItem -Path . -Name | Select-Object -First 20
          Write-Host ""
          Write-Host "=== .sln File Check ==="
          Get-ChildItem -Path . -Filter "*.sln" -Recurse | Select-Object FullName

      - name: Build
        shell: pwsh
        run: |
          $msbuildPath = Split-Path (& "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -requires Microsoft.Component.MSBuild -find MSBuild\Current\Bin\amd64\MSBuild.exe | Select-Object -First 1) -Parent
          $env:PATH = $msbuildPath + ';' + $env:PATH
          nuget locals all -clear
          msbuild -v:m -restore -t:Build -p:Configuration=Debug MissionPlanner.sln
          msbuild -v:m -restore -t:Build -p:Configuration=Release MissionPlanner.sln

      - name: List Build Outputs
        shell: pwsh
        run: |
          Write-Host "=== Release Build ==="
          Get-ChildItem -Path "bin/Release" -Recurse -Include *.exe,*.dll | Select-Object FullName
          Write-Host "=== Debug Build ==="
          Get-ChildItem -Path "bin/Debug" -Recurse -Include *.exe,*.dll | Select-Object FullName

      - name: Upload Release Build Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: DIMP-Release-Build
          path: bin/Release/

      - name: Upload Debug Build Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: DIMP-Debug-Build
          path: bin/Debug/
