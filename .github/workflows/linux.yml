name: Linux Build

on:
  push:
    branches: [master, main, develop]
    tags:
      - '*'
  pull_request:
    branches: [master, main, develop]
  workflow_dispatch:

jobs:
  build-linux:
    name: Build on Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install Mono
        run: |
          sudo apt-get update
          sudo apt-get install -y mono-complete msbuild

      - name: Build with Mono
        run: |
          msbuild MissionPlanner.sln -p:Configuration=Release -p:Platform="Any CPU" -verbosity:minimal -restore || true
        continue-on-error: true

      - name: Upload Build Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: MSBuild_Error.log